<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Media Canvas</title>
    <meta property="og:description" content="" />
    <meta property="og:image" content="https://deameser.github.io/Images/common/atelier_nodeul_logo.png" />
    

    <!-- 기본 폰트 (선택사항: 안 써도 되지만 깔끔하게 보기 좋게 넣어둠) -->

    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/styles_page.css" />
    <link rel="stylesheet" href="./css/styles_exhibit_intro_4.css" />

    <style>
        .audio-player{
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap : 10px;
            align-items: center;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,.06);
            max-width: 720px;
        }
    </style>
</head>
<body>
    <!-- ================= NAV ================= -->
    <header class="nav" id="top">
        <section class="main-title" id="main-title">
            <div class="main-title-overlays">
                <div class="main-title-overlay-left">
                        <!--style="--bg: url('Images/index_button.png'); --accent: #ffffff;"-->
                    <button class="main-title-back-btn" onclick="goBack()"
                        aria-label="">
                    <img
                            class="main-title-back-button-img"
                            src="./Images/common/button_back_icon.png"
                            alt=""
                        />
                        <img
                            class="main-title-back-button-text-img"
                            src="./Images/common/button_back_text.png"
                            alt=""
                        />
                        <!-- <span class="page-before-btn-text">
                            <h1 data-i18n="back_button_text">뒤로가기</h1>   
                        </span> -->
                    </button>
                </div>
                <div class="main-title-overlay-center">
                    <img
                        class="main-title-center-logo-img"
                        src="./Images/common/media_canvas_logo_3.png"
                        alt=""
                    />
                </div>

                <div class="main-title-overlay-right">
                    <img
                        class="lang-dropdown-icon-img"
                        src="./Images/common/lang_icon.png"
                        alt=""
                    />
                    <div class="lang-dropdown" id="langDropdown">
                        <select id="langSelect">
                            <option value="ko">KOR</option>
                            <option value="en">ENG</option>
                        </select>
                        <!-- <img id="langSelectIcon" src="./Images/common/lang_text_kor.png" alt="selectIcon" width="31" height="13"> -->
                    </div>
                </div>
            </div>  
            </section>
    </header>
    
    <main>
        <div class="info-sound">
            <audio id="info-sound-audio" src="./Sounds/3. 상영시간표2 (목차).mp3" 
                    data-src-ko="./Sounds/3. 상영시간표2 (목차).mp3"
                    data-src-en="./Sounds/3. 상영시간표2 (목차)_영어.mp3"
                    preload="metadata" autoplay playsinline></audio>
            <div class="info-sound-audio-player">
                <div class="gauge-row">
                    <span id="timeCurrent" class="time-label" aria-live="polite">00:00</span>

                    <div class="gauge-wrap" id="gaugeWrap">
                        <input id="seekBar" type="range" min="0" value="0" step="0.1">
                    </div>
                    
                    <span id="timeTotal" class="time-label">00:00</span>
                </div>
                
                
                <button id="backBtn" class="circle-btn" type="button">-10</button>
                <button id="playBtn" class="circle-btn" type="button">
                    <img id="playIcon" src="./Images/common/button_next.png" alt="play">
                </button>
                <button id="forwardBtn" class="circle-btn" type="button">+10</button>
            </div>
        </div>
        <!-- ================= Exhibit ================= -->
        <section class="exhibit-container" id="exhibit-container">
            <div class="container">
                <div class="exhibit-list-group">
                    <div class="exhibit-list-title">
                        <!-- <img class="exhibit-list-title-img" src="./Images/exhibit_intro_2/exhibit_intro_2_title_1.png" alt=""> -->
                        <h1 data-i18n="exhibit_name_2"></h1>
                    </div>
                    <div class="exhibit-list-grid">
                        <a class="exhibit-list"  href="./page_art_2_1.html" >
                            <img class="exhibit-btn-icon" src="./Images/exhibit_intro_4/exhibit_intro_4_list_icon_1.png" alt="">
                            <!-- <img class="exhibit-btn-text" src="./Images/exhibit_intro_2/exhibit_intro_2_list_text_1.png" alt=""> -->
                            <div class="exhibit-list-artist">
                                <h1 data-i18n="exhibit_artist_name_22"></h1>
                            </div>
                            <div class="exhibit-list-text">
                                <h1 data-i18n="exhibit_list_22"></h1>
                            </div>
                        </a>
                        <a class="exhibit-list"  href="./page_art_2_2.html" >
                            <img class="exhibit-btn-icon" src="./Images/exhibit_intro_4/exhibit_intro_4_list_icon_2.png" alt="">
                            <!-- <img class="exhibit-btn-text" src="./Images/exhibit_intro_2/exhibit_intro_2_list_text_2.png" alt=""> -->
                            <div class="exhibit-list-artist">
                                <h1 data-i18n="exhibit_artist_name_23"></h1>
                            </div>
                            <div class="exhibit-list-text">
                                <h1 data-i18n="exhibit_list_23"></h1>
                            </div>
                        </a>
                        <a class="exhibit-list"  href="./page_art_2_3.html" >
                            <img class="exhibit-btn-icon" src="./Images/exhibit_intro_4/exhibit_intro_4_list_icon_3.png" alt="">
                            <!-- <img class="exhibit-btn-text" src="./Images/exhibit_intro_2/exhibit_intro_2_list_text_3.png" alt=""> -->
                            <div class="exhibit-list-artist">
                                <h1 data-i18n="exhibit_artist_name_24"></h1>
                            </div>
                            <div class="exhibit-list-text">
                                <h1 data-i18n="exhibit_list_24"></h1>
                            </div>
                        </a>
                        <a class="exhibit-list"  href="./page_art_2_4.html" >
                            <img class="exhibit-btn-icon" src="./Images/exhibit_intro_4/exhibit_intro_4_list_icon_4.png" alt="">
                            <!-- <img class="exhibit-btn-text" src="./Images/exhibit_intro_2/exhibit_intro_2_list_text_4.png" alt=""> -->
                            <div class="exhibit-list-artist">
                                <h1 data-i18n="exhibit_artist_name_25"></h1>
                            </div>
                            <div class="exhibit-list-text">
                                <h1 data-i18n="exhibit_list_25"></h1>
                            </div>
                        </a>
                    </div>
                </div>

                <!-- 페이지 공통 하단 -->
                <div class="page-bottom">
                    <a class="page-top-btn" href="#top" id="goTopBtn"
                        style="--bg: url('../Images/common/button_top.png'); --accent: #ffffff;"
                        aria-label="">
                    </a>
                    <a class="page-index-btn" href="./page_exhibit_intro_4.html"
                        style="--bg: url('../Images/common/list_text.png'); --accent: #ffffff;"
                        aria-label="">
                    </a>
                </div>
                <!-- 페이지 공통 하단 고정 -->
                <div class="page-fixed-bottom">
                    <div class="page-fixed-bottom-inner">
                        <a class="page-before-btn" href="./page_art_1_21.html"
                            style="--bg: url('../Images/common/button_prev.png'); --accent: #ffffff;"
                            aria-label="">
                        </a>
                        
                        <a class="page-after-btn" href="./page_art_2_1.html"
                            style="--bg: url('../Images/common/button_next.png'); --accent: #ffffff;"
                            aria-label="">
                        </a>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <script src="./js/script.js"></script>
    <script src="./js/script_page.js"></script>
    <script src="./js/language_text.js"></script>
</body>
</html>
